<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Unicorn | Rekentool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <img src="logo.png" alt="Vanilla Unicorn Logo">
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Menu rekentool</a></li>
                    <li><a href="timers.html">Room-timers</a></li>
                </ul>
            </nav>
        </div>
    </header>


    <section class="container">
        <h2>Menu Berekening</h2>
        <div class="calculator">
            <div class="calc-item">
                <label>Bier ($50)</label>
                <input type="number" id="beer" value="0" min="0">
            </div>
            <div class="calc-item">
                <label>Whiskey ($150)</label>
                <input type="number" id="whiskey" value="0" min="0">
            </div>
            <div class="calc-item">
                <label>Champagne ($500)</label>
                <input type="number" id="champagne" value="0" min="0">
            </div>
            <button onclick="calculateTotal()" class="btn">Bereken Totaal</button>
            <h3 id="total-display" style="color: #ff00ff; margin-top: 20px; font-size: 1.5rem;">Totaal: $0</h3>
        </div>
    </section>
    <section id="hero">
        <div class="hero-content">
            <h5>Deze tool is ontwikkeld door Drijkes, in samenwerking met Gemini, exclusief voor de Vanilla Unicorn op de FiveM-server van EldoradoRP.</h5>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
