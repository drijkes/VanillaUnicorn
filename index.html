<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Unicorn | Menu & Timers</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { 
            --pink: #ff00ff; 
            --dark-bg: #0a0a0a;
            --card-bg: #111;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- HEADER STYLING --- */
        header {
            background: #000;
            border-bottom: 2px solid var(--pink);
            padding: 15px 0;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo img {
            /* Behoudt natuurlijke grootte zoals in timers.html */
            display: block;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        /* --- ROOM-TIMERS SPECIFIEKE STYLING --- */
        .room-photo {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 2px solid #ff00ff;
            margin-bottom: 10px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        /* --- MENU & REKENTOOL STYLING --- */
        .wrap { max-width: 1000px; margin: 20px auto; padding: 0 20px; }

        button, .btn-timer {
            background: #1a1a1a;
            color: #ff00ff;
            border: 1px solid #ff00ff;
            padding: 10px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        button:hover, .btn-timer:hover {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 10px #ff00ff;
        }

        button.primary {
            background: var(--pink);
            color: black;
            border: 2px solid var(--pink);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2, h3 { color: var(--pink); text-shadow: 0 0 10px rgba(255,0,255,0.3); margin-top: 0; }

        .grid-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 0.8fr 1fr auto; 
            gap: 15px; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #333;
        }

        .category-header { 
            color: var(--pink); 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 30px 0 10px 0;
            border-left: 4px solid var(--pink);
            padding-left: 15px;
        }

        .qty-input, .admin-input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .admin-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            align-items: end;
        }

        .admin-full-row { grid-column: 1 / -1; margin-top: 10px; }

        .total-pill {
            background: var(--pink);
            color: black;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 0 15px var(--pink);
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        #menu-canvas { display: none; }

        @media (max-width: 1000px) { .timer-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .timer-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <img src="logo.png" alt="Vanilla Unicorn Logo">
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Menu rekentool</a></li>
                    <li><a href="timers.html">Room-timers</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="wrap">
        <section class="card">
            <h2>✨ Bestelling Berekenen</h2>
            <div id="calculator-fields">Laden van menu...</div>
            
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="primary" onclick="calculate()">Bereken Totaal</button>
                <button onclick="resetFields()">Reset Velden</button>
            </div>

            <div id="res-container" hidden>
                <div class="total-pill">TOTAAL: €<span id="sum-total">0</span></div>
                <button class="primary" onclick="copyBon()">📋 Kopieer Bon</button>
            </div>
        </section>

        <div style="text-align: center; margin-top: 40px;">
            <button onclick="showLogin()">🔒 Beheer Producten & Menu</button>
        </div>

        <section id="admin-panel" class="card" style="display:none; margin-top: 20px; border: 1px dashed var(--pink);">
            <h3>Beheer & Menu Export</h3>
            
            <div style="background: rgba(255,0,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid rgba(255,0,255,0.2);">
                <h4 style="margin-top:0;">🖼️ Menu Afbeelding Genereren</h4>
                <button class="primary" onclick="generateMenuImage()">📸 Download Menu Kaart</button>
            </div>

            <div class="admin-controls">
                <div>
                    <label style="font-size: 0.7rem; color: #888;">PRODUCT NAAM</label>
                    <input type="text" id="new-name" class="admin-input" placeholder="bijv. Mojito">
                </div>
                <div>
                    <label style="font-size: 0.7rem; color: #888;">PRIJS (€)</label>
                    <input type="number" id="new-price" class="admin-input" placeholder="60">
                </div>
                <div>
                    <label style="font-size: 0.7rem; color: #888;">CATEGORIE</label>
                    <select id="cat-select" class="admin-input">
                        <option value="Cocktails">Cocktails</option>
                        <option value="Mocktails">Mocktails</option>
                        <option value="Alcoholische Dranken">Alcoholische Dranken</option>
                        <option value="Frisdranken">Frisdranken</option>
                    </select>
                </div>

                <div class="admin-full-row">
                    <button class="primary" style="width: 100%;" onclick="addProduct()">Product Opslaan</button>
                </div>
            </div>
            <br>
            <button onclick="location.reload()">Beheer Sluiten</button>
        </section>
    </div>

    <div id="login-overlay">
        <div class="card" style="text-align: center; width: 300px;">
            <h3>Personeel Login</h3>
            <input type="password" id="pass-input" class="admin-input" style="width: 100%; margin-bottom: 15px;" placeholder="Wachtwoord">
            <button class="primary" style="width:100%" onclick="checkLogin()">Login</button>
        </div>
    </div>

    <canvas id="menu-canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCGwVSBIOTwKjgTTDil9LB_G8Luyi2lIUc",
          authDomain: "vanillaunicornmenu.firebaseapp.com",
          databaseURL: "https://vanillaunicornmenu-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "vanillaunicornmenu",
          storageBucket: "vanillaunicornmenu.firebasestorage.app",
          messagingSenderId: "313401459961",
          appId: "1:313401459961:web:ec2c0990d3836de48c8e28"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const menuRef = ref(db, 'menu');

        let menu = [];
        window.isAdmin = false;
        const fixedCategories = ["Cocktails", "Mocktails", "Alcoholische Dranken", "Frisdranken"];

        onValue(menuRef, (snapshot) => {
            const data = snapshot.val();
            menu = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            render();
        });

        function render() {
            const container = document.getElementById('calculator-fields');
            container.innerHTML = '';

            fixedCategories.forEach(cat => {
                const items = menu.filter(i => i.cat === cat);
                if(items.length > 0 || window.isAdmin) {
                    container.innerHTML += `<div class="category-header">${cat}</div>`;
                    items.forEach(item => {
                        container.innerHTML += `<div class="grid-row">
                            <span>${item.name}</span>
                            <span style="color:#777;">€${item.price}</span>
                            <input type="number" class="qty-input admin-input" data-id="${item.id}" value="0" min="0" style="width: 60px; text-align: center; padding: 5px;">
                            <span style="color:var(--pink); font-weight:bold; text-align: right;">€<span id="sub-${item.id}">0</span></span>
                            ${window.isAdmin ? `<button style="color:red; border-color:red; padding:2px 8px;" onclick="removeProduct('${item.id}')">X</button>` : ''}
                        </div>`;
                    });
                }
            });

            if (menu.length === 0) container.innerHTML = "Geen producten gevonden.";
        }

        window.addProduct = function() {
            const name = document.getElementById('new-name').value.trim();
            const price = parseFloat(document.getElementById('new-price').value);
            const cat = document.getElementById('cat-select').value;
            if(name && !isNaN(price)) {
                push(menuRef, { name, price, cat });
                document.getElementById('new-name').value = '';
                document.getElementById('new-price').value = '';
            }
        };

        window.removeProduct = function(id) {
            if(confirm("Verwijderen?")) remove(ref(db, 'menu/' + id));
        };

        window.calculate = function() {
            let total = 0;
            document.querySelectorAll('.qty-input').forEach(input => {
                const id = input.getAttribute('data-id');
                const item = menu.find(i => i.id === id);
                if(item) {
                    const sub = (parseInt(input.value) || 0) * item.price;
                    document.getElementById(`sub-${id}`).textContent = sub;
                    total += sub;
                }
            });
            document.getElementById('sum-total').textContent = total;
            document.getElementById('res-container').hidden = false;
        };

        window.generateMenuImage = function() {
            const canvas = document.getElementById('menu-canvas');
            const ctx = canvas.getContext('2d');
            const bg = new Image();
            bg.setAttribute('crossOrigin', 'anonymous');
            bg.src = 'menu_bg.png?' + new Date().getTime();

            bg.onload = function() {
                canvas.width = bg.width; canvas.height = bg.height;
                ctx.drawImage(bg, 0, 0);
                const yStart = 480; let y = yStart; const margin = 100;
                const columnWidth = (canvas.width / 2) - (margin * 1.3);
                
                fixedCategories.forEach((cat, index) => {
                    const items = menu.filter(i => i.cat === cat);
                    if(items.length === 0) return;
                    let col = index % 2;
                    let xPos = margin + (col * (columnWidth + 80));
                    if (col === 1 && index === 1) y = yStart;
                    ctx.font = "bold 42px Arial"; ctx.fillStyle = "#ff00ff"; ctx.textAlign = "left";
                    ctx.shadowBlur = 10; ctx.shadowColor = "#ff00ff";
                    ctx.fillText(cat.toUpperCase(), xPos, y);
                    ctx.shadowBlur = 0; y += 60;
                    ctx.font = "32px Arial"; ctx.fillStyle = "white";
                    items.forEach(item => {
                        ctx.textAlign = "left"; ctx.fillText(item.name, xPos + 10, y);
                        ctx.textAlign = "right"; ctx.fillText(`€${item.price},-`, xPos + columnWidth, y);
                        y += 45;
                    });
                    y += 70;
                });
                const link = document.createElement('a');
                link.download = 'Vanilla_Unicorn_Menu.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            bg.onerror = () => alert("Zorg dat 'menu_bg.png' in de map staat.");
        };

        window.checkLogin = function() {
            if(document.getElementById('pass-input').value === "unicorn2024") {
                window.isAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('login-overlay').style.display = 'none';
                render();
            } else { alert("Fout!"); }
        };

        window.showLogin = function() { document.getElementById('login-overlay').style.display = 'flex'; };
        
        window.resetFields = function() { 
            document.querySelectorAll('.qty-input').forEach(i => i.value = 0); 
            window.calculate();
        };

        window.copyBon = function() {
            let text = "UNICORN BON:\n";
            document.querySelectorAll('.qty-input').forEach(input => {
                const qty = parseInt(input.value) || 0;
                if(qty > 0) {
                    const item = menu.find(i => i.id === input.getAttribute('data-id'));
                    text += `${qty}x ${item.name} (€${qty * item.price})\n`;
                }
            });
            text += "TOTAAL: €" + document.getElementById('sum-total').textContent;
            navigator.clipboard.writeText(text).then(() => alert("Bon gekopieerd!"));
        };
    </script>
</body>
</html>
