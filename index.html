<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Unicorn | Room-timers</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { 
            --pink: #ff00ff; 
            --dark-bg: #0a0a0a;
            --card-bg: #111;
        }

        /* --- HEADER & NAVIGATIE STYLING --- */
        header {
            background: #000;
            border-bottom: 2px solid var(--pink);
            padding: 15px 0;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo img {
            height: 60px; /* Pas aan naar wens */
            display: block;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--pink);
            text-shadow: 0 0 8px var(--pink);
        }

        /* --- BODY & ALGEMENE STYLING --- */
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .wrap { max-width: 1000px; margin: 20px auto; padding: 0 20px; }

        button, .btn-timer {
            background: #1a1a1a;
            color: #ff00ff;
            border: 1px solid #ff00ff;
            padding: 10px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        button:hover, .btn-timer:hover {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 10px #ff00ff;
        }

        button.primary {
            background: var(--pink);
            color: black;
            border: 2px solid var(--pink);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2, h3 { color: var(--pink); text-shadow: 0 0 10px rgba(255,0,255,0.3); margin-top: 0; }

        .grid-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 0.8fr 1fr auto; 
            gap: 15px; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #333;
        }

        .category-header { 
            color: var(--pink); 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 30px 0 10px 0;
            border-left: 4px solid var(--pink);
            padding-left: 15px;
        }

        .qty-input, .admin-input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        .total-pill {
            background: var(--pink);
            color: black;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            margin: 20px 0;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        #menu-canvas { display: none; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <img src="logo.png" alt="Vanilla Unicorn Logo">
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Menu rekentool</a></li>
                    <li><a href="timers.html">Room-timers</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="wrap">
        <section class="card">
            <h2>✨ Bestelling Berekenen</h2>
            <div id="calculator-fields"></div>
            
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="primary" onclick="calculate()">Bereken Totaal</button>
                <button onclick="resetFields()">Reset Velden</button>
            </div>

            <div id="res-container" hidden>
                <div class="total-pill">TOTAAL: €<span id="sum-total">0</span></div>
                <button class="primary" onclick="copyBon()">📋 Kopieer Bon</button>
            </div>
        </section>

        <div style="text-align: center; margin-top: 40px;">
            <button onclick="showLogin()">🔒 Beheer Producten & Menu</button>
        </div>

        <section id="admin-panel" class="card" style="display:none; margin-top: 20px; border: 1px dashed var(--pink);">
            <h3>Beheer & Menu Export</h3>
            <div style="background: rgba(255,0,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 25px;">
                <button class="primary" onclick="generateMenuImage()">📸 Download Menu Afbeelding</button>
            </div>

            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <input type="text" id="new-name" class="admin-input" placeholder="Naam">
                <input type="number" id="new-price" class="admin-input" placeholder="Prijs">
                <select id="cat-select" class="admin-input" onchange="toggleNewCat(this.value)"></select>
                <input type="text" id="new-cat-name" id="new-cat-wrapper" style="display:none;" class="admin-input" placeholder="Nieuwe Cat">
                <button class="primary" onclick="addProduct()">Voeg Toe</button>
            </div>
            <br>
            <button onclick="location.reload()">Sluiten</button>
        </section>
    </div>

    <div id="login-overlay">
        <div class="card" style="text-align: center; width: 300px;">
            <h3>Login</h3>
            <input type="password" id="pass-input" class="admin-input" style="width: 100%; margin-bottom: 15px;" placeholder="Wachtwoord">
            <button class="primary" onclick="checkLogin()">Inloggen</button>
        </div>
    </div>

    <canvas id="menu-canvas"></canvas>

    <script>
        const defaultMenu = [
            { id: '1', name: 'Candy Kiss', price: 69, cat: 'Cocktails' },
            { id: '2', name: 'Pillow Talk', price: 69, cat: 'Cocktails' },
            { id: '3', name: 'Whiskey', price: 60, cat: 'Sterke Drank' }
        ];

        let menu = JSON.parse(localStorage.getItem('vu_menu')) || defaultMenu;
        let isAdmin = false;

        function render() {
            const container = document.getElementById('calculator-fields');
            const categories = [...new Set(menu.map(item => item.cat))];
            container.innerHTML = '';
            categories.forEach(cat => {
                container.innerHTML += `<div class="category-header">${cat}</div>`;
                menu.filter(i => i.cat === cat).forEach(item => {
                    container.innerHTML += `
                        <div class="grid-row">
                            <span>${item.name}</span>
                            <span style="color:#777;">€${item.price}</span>
                            <input type="number" class="qty-input" data-id="${item.id}" value="0" min="0" style="width:50px;">
                            <span style="color:var(--pink); font-weight:bold; text-align: right;">€<span id="sub-${item.id}">0</span></span>
                            ${isAdmin ? `<button onclick="removeProduct('${item.id}')" style="color:red; border-color:red;">X</button>` : ''}
                        </div>`;
                });
            });
            const select = document.getElementById('cat-select');
            select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="NEW">+ Nieuwe...</option>`;
        }

        function showLogin() { document.getElementById('login-overlay').style.display = 'flex'; }
        function hideLogin() { document.getElementById('login-overlay').style.display = 'none'; }
        function checkLogin() {
            if(document.getElementById('pass-input').value === "unicorn2024") {
                isAdmin = true; hideLogin();
                document.getElementById('admin-panel').style.display = 'block';
                render();
            }
        }

        function calculate() {
            let total = 0;
            document.querySelectorAll('.qty-input').forEach(input => {
                const id = input.getAttribute('data-id');
                const item = menu.find(i => i.id === id);
                const sub = (parseInt(input.value) || 0) * item.price;
                document.getElementById(`sub-${id}`).textContent = sub;
                total += sub;
            });
            document.getElementById('sum-total').textContent = total;
            document.getElementById('res-container').hidden = false;
        }

        function generateMenuImage() {
            const canvas = document.getElementById('menu-canvas');
            const ctx = canvas.getContext('2d');
            const bg = new Image();
            bg.src = 'menu_bg.png?' + new Date().getTime();

            bg.onload = function() {
                canvas.width = bg.width;
                canvas.height = bg.height;
                ctx.drawImage(bg, 0, 0);

                const logoHoogte = 500; // Pas dit aan voor je menu_bg.png logo
                const margeX = 100;
                const kolomBreedte = (canvas.width / 2) - (margeX * 1.5);
                const tweedeKolomX = (canvas.width / 2) + (margeX / 2);
                
                let yLinks = logoHoogte;
                let yRechts = logoHoogte;
                
                const categories = [...new Set(menu.map(item => item.cat))];
                
                categories.forEach((cat, index) => {
                    const links = index % 2 === 0;
                    let curX = links ? margeX : tweedeKolomX;
                    let curY = links ? yLinks : yRechts;

                    ctx.font = "bold 45px Arial";
                    ctx.fillStyle = "#ff00ff";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ff00ff";
                    ctx.textAlign = "left";
                    ctx.fillText(cat.toUpperCase(), curX, curY);
                    
                    curY += 65;
                    ctx.shadowBlur = 0;
                    ctx.font = "32px Arial";
                    ctx.fillStyle = "white";
                    
                    menu.filter(i => i.cat === cat).forEach(item => {
                        ctx.textAlign = "left";
                        ctx.fillText(item.name, curX + 15, curY);
                        ctx.textAlign = "right";
                        ctx.fillText(`€${item.price}`, curX + kolomBreedte, curY);
                        curY += 45;
                    });

                    curY += 80;
                    if (links) yLinks = curY; else yRechts = curY;
                });

                const link = document.createElement('a');
                link.download = 'Vanilla_Unicorn_Menu.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
        }

        function addProduct() {
            const name = document.getElementById('new-name').value;
            const price = parseFloat(document.getElementById('new-price').value);
            const cat = document.getElementById('cat-select').value === 'NEW' ? document.getElementById('new-cat-name').value : document.getElementById('cat-select').value;
            if(name && price && cat) {
                menu.push({ id: Date.now().toString(), name, price, cat });
                localStorage.setItem('vu_menu', JSON.stringify(menu));
                render();
            }
        }

        function removeProduct(id) {
            menu = menu.filter(i => i.id !== id);
            localStorage.setItem('vu_menu', JSON.stringify(menu));
            render();
        }

        function toggleNewCat(v) { document.getElementById('new-cat-name').style.display = v === 'NEW' ? 'block' : 'none'; }
        function resetFields() { document.querySelectorAll('.qty-input').forEach(i => i.value = 0); calculate(); }
        function copyBon() { alert("Bon gekopieerd!"); }

        render();
    </script>
</body>
</html>
