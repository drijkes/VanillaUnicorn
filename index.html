<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Unicorn | Room-timers</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { 
            --pink: #ff00ff; 
            --dark-bg: #0a0a0a;
            --card-bg: #111;
        }

        /* --- HEADER & NAVIGATIE (STRICT ONGEWIJZIGD) --- */
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .wrap { max-width: 1000px; margin: 20px auto; padding: 0 20px; }

        /* De knoppen en navigatie uit je bronbestand */
        button, .btn-timer {
            background: #1a1a1a;
            color: #ff00ff;
            border: 1px solid #ff00ff;
            padding: 10px 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        button:hover, .btn-timer:hover {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 10px #ff00ff;
        }

        button.primary {
            background: var(--pink);
            color: black;
            border: 2px solid var(--pink);
        }

        button.primary:hover {
            background: white;
            color: black;
            border-color: white;
            box-shadow: 0 0 20px white;
        }

        /* Kaart styling */
        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2, h3 { color: var(--pink); text-shadow: 0 0 10px rgba(255,0,255,0.3); margin-top: 0; }

        .grid-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 0.8fr 1fr auto; 
            gap: 15px; 
            align-items: center; 
            padding: 12px 0; 
            border-bottom: 1px solid #333;
        }

        .category-header { 
            color: var(--pink); 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 30px 0 10px 0;
            border-left: 4px solid var(--pink);
            padding-left: 15px;
        }

        .qty-input, .admin-input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        .total-pill {
            background: var(--pink);
            color: black;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 0 15px var(--pink);
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        #menu-canvas { display: none; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <img src="logo.png" alt="Vanilla Unicorn Logo">
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Menu rekentool</a></li>
                    <li><a href="timers.html">Room-timers</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="wrap">
        <section class="card">
            <h2>✨ Bestelling Berekenen</h2>
            <div id="calculator-fields"></div>
            
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="primary" onclick="calculate()">Bereken Totaal</button>
                <button onclick="resetFields()">Reset Velden</button>
            </div>

            <div id="res-container" hidden>
                <div class="total-pill">TOTAAL: €<span id="sum-total">0</span></div>
                <button class="primary" onclick="copyBon()">📋 Kopieer Bon</button>
            </div>
        </section>

        <div style="text-align: center; margin-top: 40px;">
            <button onclick="showLogin()">🔒 Beheer Producten & Menu</button>
        </div>

        <section id="admin-panel" class="card" style="display:none; margin-top: 20px; border: 1px dashed var(--pink);">
            <h3>Beheer & Menu Export</h3>
            <div style="background: rgba(255,0,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid rgba(255,0,255,0.2);">
                <button class="primary" onclick="generateMenuImage()">📸 Download Menu Kaart</button>
            </div>

            <div class="admin-controls" style="display: flex; flex-wrap: wrap; gap: 15px;">
                <input type="text" id="new-name" class="admin-input" placeholder="Naam">
                <input type="number" id="new-price" class="admin-input" placeholder="Prijs">
                <select id="cat-select" class="admin-input" onchange="toggleNewCat(this.value)"></select>
                <div id="new-cat-wrapper" style="display:none;">
                    <input type="text" id="new-cat-name" class="admin-input" placeholder="Nieuwe cat...">
                </div>
                <button class="primary" onclick="addProduct()">Voeg Toe</button>
            </div>
            <br>
            <button onclick="location.reload()">Sluiten</button>
        </section>
    </div>

    <div id="login-overlay">
        <div class="card" style="text-align: center; width: 300px;">
            <h3>Personeel Login</h3>
            <input type="password" id="pass-input" class="admin-input" style="width: 100%; margin-bottom: 15px;" placeholder="Wachtwoord">
            <button class="primary" style="width:100%" onclick="checkLogin()">Login</button>
        </div>
    </div>

    <canvas id="menu-canvas"></canvas>

    <script>
        const defaultMenu = [
            { id: '1', name: 'Candy Kiss', price: 69, cat: 'Cocktails' },
            { id: '2', name: 'Pillow Talk', price: 69, cat: 'Cocktails' },
            { id: '3', name: 'The Mistress', price: 69, cat: 'Cocktails' },
            { id: '4', name: 'Whiskey', price: 60, cat: 'Sterke Drank' }
        ];

        let menu = JSON.parse(localStorage.getItem('vu_menu')) || defaultMenu;
        let isAdmin = false;

        function render() {
            const container = document.getElementById('calculator-fields');
            const categories = [...new Set(menu.map(item => item.cat))];
            container.innerHTML = '';
            categories.forEach(cat => {
                container.innerHTML += `<div class="category-header">${cat}</div>`;
                menu.filter(i => i.cat === cat).forEach(item => {
                    container.innerHTML += `
                        <div class="grid-row">
                            <span>${item.name}</span>
                            <span style="color:#777;">€${item.price}</span>
                            <input type="number" class="qty-input" data-id="${item.id}" value="0" min="0" style="width: 50px;">
                            <span style="color:var(--pink); font-weight:bold; text-align: right;">€<span id="sub-${item.id}">0</span></span>
                            ${isAdmin ? `<button onclick="removeProduct('${item.id}')" style="color:red;border-color:red">X</button>` : ''}
                        </div>`;
                });
            });
            const select = document.getElementById('cat-select');
            if(select) select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="NEW">+ Nieuwe...</option>`;
        }

        function showLogin() { document.getElementById('login-overlay').style.display = 'flex'; }
        function hideLogin() { document.getElementById('login-overlay').style.display = 'none'; }
        
        function checkLogin() {
            if(document.getElementById('pass-input').value === "unicorn2024") {
                isAdmin = true; hideLogin();
                document.getElementById('admin-panel').style.display = 'block';
                render();
            } else { alert("Fout!"); }
        }

        // --- DE GENERATOR DIE DE AFBEELDING OPMAAKT ---
        function generateMenuImage() {
            const canvas = document.getElementById('menu-canvas');
            const ctx = canvas.getContext('2d');
            const bg = new Image();
            
            // Verwijst naar jouw menu_bg.jpg
            bg.src = 'menu_bg.jpg?' + new Date().getTime();

            bg.onload = function() {
                // Canvas krijgt exact de grootte van de achtergrondafbeelding
                canvas.width = bg.width;
                canvas.height = bg.height;
                ctx.drawImage(bg, 0, 0);

                // STARTWAARDE: 480px zorgt dat tekst ONDER het gouden logo begint
                const yStart = 480; 
                let y = yStart;
                const margin = 100;
                // We gebruiken 2 kolommen om te voorkomen dat de lijst te lang wordt
                const columnWidth = (canvas.width / 2) - (margin * 1.3);
                
                const categories = [...new Set(menu.map(item => item.cat))];

                categories.forEach((cat, index) => {
                    let col = index % 2; // 0 is links, 1 is rechts
                    let xPos = margin + (col * (columnWidth + 80));
                    
                    if (col === 1 && index === 1) y = yStart;

                    // Teken Categorie (Neon Pink)
                    ctx.font = "bold 42px Arial";
                    ctx.fillStyle = "#ff00ff";
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "#ff00ff";
                    ctx.fillText(cat.toUpperCase(), xPos, y);
                    
                    ctx.shadowBlur = 0;
                    y += 60;

                    // Teken Producten (Wit)
                    ctx.font = "32px Arial";
                    ctx.fillStyle = "white";

                    menu.filter(i => i.cat === cat).forEach(item => {
                        ctx.textAlign = "left";
                        ctx.fillText(item.name, xPos + 10, y);
                        ctx.textAlign = "right";
                        ctx.fillText(`€${item.price},-`, xPos + columnWidth, y);
                        y += 45;
                    });
                    y += 70;
                });

                const link = document.createElement('a');
                link.download = 'Vanilla_Unicorn_Menu.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
        }

        function calculate() {
            let total = 0;
            document.querySelectorAll('.qty-input').forEach(input => {
                const id = input.getAttribute('data-id');
                const item = menu.find(i => i.id === id);
                const sub = (parseInt(input.value) || 0) * item.price;
                document.getElementById(`sub-${id}`).textContent = sub;
                total += sub;
            });
            document.getElementById('sum-total').textContent = total;
            document.getElementById('res-container').hidden = false;
        }

        function resetFields() { document.querySelectorAll('.qty-input').forEach(i => i.value = 0); calculate(); }
        function toggleNewCat(v) { document.getElementById('new-cat-wrapper').style.display = v === 'NEW' ? 'block' : 'none'; }
        function addProduct() { /* ...zelfde logica... */ }
        function removeProduct(id) { /* ...zelfde logica... */ }

        render();
    </script>
</body>
</html>
